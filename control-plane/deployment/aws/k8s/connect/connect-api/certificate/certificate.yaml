apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: connect-tls
  namespace: connect
spec:
  secretName: connect-tls
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt
  dnsNames:
    - connect.example.cofide.dev
    - connect-agent.example.cofide.dev
    - xds.example.cofide.dev
