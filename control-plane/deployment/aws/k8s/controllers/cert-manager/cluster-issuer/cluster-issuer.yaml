apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt
spec:
  acme:
    email: admin@example.com

    server: https://acme-v02.api.letsencrypt.org/directory
    # Use the staging server to avoid rate limits while testing:
    # server: https://acme-staging-v02.api.letsencrypt.org/directory

    privateKeySecretRef:
      name: letsencrypt-account-key

    solvers:
      - dns01:
          route53:
            region: eu-west-2
            # The Route53 hosted zone managed by the cert-manager IAM role
            # (configured in infra/stack/base/eks-cluster/controllers/cert-manager/).
            hostedZoneID: Z0000000000000000000
