# Helm values for the Cofide SPIRE server (cofide/spire chart).
# https://charts.cofide.dev
#
# Cluster-specific values must be supplied in values.local.yaml.
# Copy values.local.yaml.example to values.local.yaml and fill in your values.

global:
  spire:
    namespaces:
      create: true
    recommendations:
      enabled: true
    strictMode: true

spiffe-oidc-discovery-provider:
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 3
  service:
    type: LoadBalancer
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-type: external
      service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
      service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip
      service.beta.kubernetes.io/aws-load-balancer-healthcheck-protocol: tcp
  tls:
    spire:
      enabled: false
    certManager:
      enabled: true
      issuer:
        create: false
      certificate:
        issuerRef:
          kind: ClusterIssuer

spire-server:
  kind: deployment
  replicaCount: 2
  persistence:
    type: emptyDir
  dataStore:
    sql:
      databaseType: aws_postgres
      options:
        - sslmode: require
  keyManager:
    awsKMS:
      enabled: true
      keyIdentifierFile:
        enabled: false
      keyIdentifierValue:
        enabled: true
        identifier: "$POD_NAME"
    disk:
      enabled: false
  extraEnv:
    - name: POD_NAME
      valueFrom:
        fieldRef:
          fieldPath: metadata.name
  upstreamAuthority:
    certManager:
      enabled: true
      rbac:
        create: true
      ca:
        create: true
  nodeAttestor:
    k8sPSAT:
      audience:
        - spire-server
  controllerManager:
    identities:
      clusterSPIFFEIDs:
        default:
          enabled: false
        namespace-connect:
          spiffeIDTemplate: 'spiffe://{{ .TrustDomain }}/ns/{{ .PodMeta.Namespace }}/sa/{{ .PodSpec.ServiceAccountName }}'
          namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: connect
  telemetry:
    prometheus:
      enabled: true
